spec_version: 1
name: openenv-datacleaner
type: space
runtime: fastapi
app: env.app:app
port: 7860

metadata:
  description: OpenEnv-compliant data cleaning environment for evaluating real-world tabular remediation agents.
  tags:
    - openenv
    - data-cleaning
    - tabular-data
    - huggingface-space

tasks:
  - id: easy_001
    name: Basic Data Cleaning
    difficulty: easy
    description: Drop null-heavy rows and remove duplicates from a small employee-style dataset.
    grader: env.grader.EasyDataCleaningGrader
  - id: medium_001
    name: Intermediate Data Cleaning
    difficulty: medium
    description: Resolve missing values, validate emails, and remove outliers while preserving useful rows.
    grader: env.grader.MediumDataCleaningGrader
  - id: hard_001
    name: Advanced Data Cleaning
    difficulty: hard
    description: Execute a multi-step cleaning pipeline including type conversion and normalization on a larger dataset.
    grader: env.grader.HardDataCleaningGrader
  - id: employee_demo
    name: Employee Dataset Cleaning
    difficulty: hard
    description: Clean a realistic HR dataset with missing values, duplicates, and numeric outliers.
    grader: env.grader.EmployeeDataCleaningGrader
